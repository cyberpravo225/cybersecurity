
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">

<title>Тест: Фишинг и мошенники</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="page">

<div class="theme-backdrop" aria-hidden="true">

  <div class="theme-grid"></div>

<div class="site">
