<!doctype html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация — Кибербезопасность</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap { max-width: 560px; margin: 40px auto; display: grid; gap: 14px; }
    .auth-grid { display: grid; gap: 10px; }
    .auth-grid input { width: 100%; }
    .auth-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .auth-status { min-height: 1.4em; font-weight: 700; }
    .auth-status.ok { color: #16a34a; }
    .auth-status.error { color: #dc2626; }
  </style>
</head>
<body>
  <main class="main">
    <section class="section">
      <div class="container auth-wrap">
        <div class="card">
          <h1>Вход в аккаунт</h1>
          <p id="authReason">Чтобы продолжить, войдите в аккаунт.</p>
          <div class="auth-grid">
            <input id="email" class="bc-input" type="email" placeholder="Email" />
            <input id="password" class="bc-input" type="password" placeholder="Пароль" />
            <input id="username" class="bc-input" type="text" placeholder="Логин (для регистрации)" />
            <input id="birthDate" class="bc-input" type="date" />
          </div>
          <div class="auth-actions" style="margin-top:10px;">
            <button id="loginBtn" class="btn primary" type="button">Войти</button>
            <button id="registerBtn" class="btn" type="button">Регистрация</button>
          </div>
          <p id="status" class="auth-status" aria-live="polite"></p>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-auth.js"></script>
  <script>
    (function () {
      const reasonEl = document.getElementById('authReason');
      const statusEl = document.getElementById('status');
      const params = new URLSearchParams(location.search);
      const reason = params.get('reason');
      const next = params.get('next') || 'index.html';
      if (reason) reasonEl.textContent = reason;

      const setStatus = (text, type = '') => {
        statusEl.textContent = text;
        statusEl.className = `auth-status ${type}`.trim();
      };

      const emailEl = document.getElementById('email');
      const passEl = document.getElementById('password');
      const userEl = document.getElementById('username');
      const birthEl = document.getElementById('birthDate');

      async function login() {
        try {
          const email = emailEl.value.trim();
          const password = passEl.value;
          if (!email || !password) throw new Error('Введите email и пароль.');
          const sb = window.CyberSupabaseAuth.createClient(true);
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          setStatus('Успешный вход, перенаправляем…', 'ok');
          window.location.href = next;
        } catch (error) {
          setStatus(error.message || 'Ошибка входа.', 'error');
        }
      }

      async function register() {
        try {
          const email = emailEl.value.trim();
          const password = passEl.value;
          const username = userEl.value.trim();
          const birth_date = birthEl.value;
          if (!email || !password || !username || !birth_date) throw new Error('Для регистрации заполните все поля.');
          const sb = window.CyberSupabaseAuth.createClient(true);
          const { data, error } = await sb.auth.signUp({ email, password });
          if (error) throw error;
          if (!data?.user) throw new Error('Не удалось создать пользователя.');
          const { error: profileError } = await sb.from('profiles').upsert({ id: data.user.id, username, birth_date }, { onConflict: 'id' });
          if (profileError) throw profileError;
          setStatus('Регистрация успешна. Теперь войдите.', 'ok');
        } catch (error) {
          setStatus(error.message || 'Ошибка регистрации.', 'error');
        }
      }

      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('registerBtn').addEventListener('click', register);
    })();
  </script>
</body>
</html>
