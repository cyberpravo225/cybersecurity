<!doctype html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — Кибербезопасность</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body.auth-page {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(255, 255, 255, 0.75);
      color: #0f172a;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .profile-modal {
      width: min(560px, calc(100vw - 32px));
      border-radius: 20px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.96), rgba(239, 246, 255, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.38);
      box-shadow: 0 34px 60px rgba(15, 23, 42, 0.24);
      padding: 22px;
    }

    .profile-modal__title {
      margin: 0;
      font-size: clamp(1.65rem, 3.8vw, 2rem);
      letter-spacing: -0.02em;
      color: #0b1220;
    }

    .profile-modal__text {
      margin: 8px 0 14px;
      color: #334155;
      font-weight: 600;
    }

    .profile-modal__panel {
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .profile-modal__fields {
      display: grid;
      gap: 10px;
    }

    .profile-modal__actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .profile-modal__actions .btn {
      flex: 1;
      min-width: 160px;
    }

    .profile-modal__status {
      margin: 6px 0 0;
      min-height: 1.4em;
      font-weight: 700;
    }

    .profile-modal__status.ok { color: #16a34a; }
    .profile-modal__status.error { color: #dc2626; }

    :root[data-theme="dark"] .theme-toggle {
      background: rgba(15, 23, 42, 0.72);
      border-color: rgba(148, 163, 184, 0.45);
      color: #e2e8f0;
      box-shadow: 0 10px 24px rgba(2, 8, 23, 0.45);
    }

    :root[data-theme="dark"] .profile-modal {
      background: linear-gradient(160deg, rgba(2, 6, 23, 0.94), rgba(15, 23, 42, 0.88));
      border-color: rgba(71, 85, 105, 0.55);
      box-shadow: 0 28px 56px rgba(2, 6, 23, 0.62);
    }

    :root[data-theme="dark"] .profile-modal__title { color: #f8fafc; }
    :root[data-theme="dark"] .profile-modal__text { color: #cbd5e1; }

    :root[data-theme="dark"] .profile-modal__panel {
      background: rgba(15, 23, 42, 0.72);
      border-color: rgba(71, 85, 105, 0.6);
      box-shadow: inset 0 1px 0 rgba(148, 163, 184, 0.2);
    }
  </style>
</head>
<body class="auth-page">
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Переключить тему" title="Тема">🌙</button>

  <section class="profile-modal" aria-labelledby="profileTitle">
    <h1 id="profileTitle" class="profile-modal__title">Профиль</h1>
    <p id="authReason" class="profile-modal__text">Войдите в аккаунт.</p>

    <div class="profile-modal__panel">
      <div class="profile-modal__fields">
        <input id="email" class="bc-input" type="email" placeholder="Email" />
        <input id="password" class="bc-input" type="password" placeholder="Пароль" />
        <input id="username" class="bc-input" type="text" placeholder="Логин (для регистрации)" />
        <input id="birthDate" class="bc-input" type="date" />
      </div>

      <div class="profile-modal__actions">
        <button id="loginBtn" class="btn primary" type="button">Войти</button>
        <button id="registerBtn" class="btn" type="button">Регистрация</button>
      </div>

      <p id="status" class="profile-modal__status" aria-live="polite"></p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-auth.js"></script>
  <script>
    (function () {
      const root = document.documentElement;
      const THEME_KEY = 'cyber_theme';
      const themeToggle = document.getElementById('theme-toggle');

      const setThemeIcon = () => {
        const isDark = root.getAttribute('data-theme') === 'dark';
        themeToggle.textContent = isDark ? '☀️' : '🌙';
      };

      const savedTheme = localStorage.getItem(THEME_KEY);
      if (savedTheme) {
        root.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        root.setAttribute('data-theme', 'dark');
      }
      setThemeIcon();

      themeToggle.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem(THEME_KEY, next);
        setThemeIcon();
      });

      const reasonEl = document.getElementById('authReason');
      const statusEl = document.getElementById('status');
      const params = new URLSearchParams(location.search);
      const reason = params.get('reason');
      const next = params.get('next') || 'index.html';
      if (reason) reasonEl.textContent = reason;

      const setStatus = (text, type = '') => {
        statusEl.textContent = text;
        statusEl.className = `profile-modal__status ${type}`.trim();
      };

      const emailEl = document.getElementById('email');
      const passEl = document.getElementById('password');
      const userEl = document.getElementById('username');
      const birthEl = document.getElementById('birthDate');

      async function login() {
        try {
          const email = emailEl.value.trim();
          const password = passEl.value;
          if (!email || !password) throw new Error('Введите email и пароль.');
          const sb = window.CyberSupabaseAuth.createClient(true);
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          setStatus('Успешный вход, перенаправляем…', 'ok');
          window.location.href = next;
        } catch (error) {
          setStatus(error.message || 'Ошибка входа.', 'error');
        }
      }

      async function register() {
        try {
          const email = emailEl.value.trim();
          const password = passEl.value;
          const username = userEl.value.trim();
          const birth_date = birthEl.value;
          if (!email || !password || !username || !birth_date) throw new Error('Для регистрации заполните все поля.');
          const sb = window.CyberSupabaseAuth.createClient(true);
          const { data, error } = await sb.auth.signUp({ email, password });
          if (error) throw error;
          if (!data?.user) throw new Error('Не удалось создать пользователя.');
          const { error: profileError } = await sb.from('profiles').upsert({ id: data.user.id, username, birth_date }, { onConflict: 'id' });
          if (profileError) throw profileError;
          setStatus('Регистрация успешна. Теперь войдите.', 'ok');
        } catch (error) {
          setStatus(error.message || 'Ошибка регистрации.', 'error');
        }
      }

      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('registerBtn').addEventListener('click', register);
    })();
  </script>
  <script src="js/background-mode.js"></script>
</body>
</html>
