<!doctype html>
<html lang="ru">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Тест — Пароли и защита аккаунтов (средний)</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="page">

<div class="site">

<header class="topbar glass">

<a class="back-btn" href="tests.html">
← НАЗАД
</a>

<nav class="nav">

<button id="theme-toggle" class="btn icon-btn" aria-label="Переключить тему">

<svg class="icon-theme" width="22" height="22" viewBox="0 0 24 24" fill="none">

<path class="icon-moon" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>

<g class="icon-sun">
<circle cx="12" cy="12" r="4"/>
</g>

</svg>

</button>

</nav>

</header>


<main class="main">

<section class="section container test-page">

<h1 class="test-title">
Тест: Пароли и защита аккаунтов
</h1>

<p class="test-level">
Уровень: средний
</p>


<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>


<div class="test-question" id="questionText"></div>

<div class="answers-grid" id="answers"></div>

<div class="test-explanation" id="explanation"></div>

<button class="btn primary next-btn" id="nextBtn">
Следующий вопрос
</button>

</section>

</main>

</div>

<script src="js/main.js"></script>

<script>
const questions = [

{
q:"Почему нельзя использовать один и тот же пароль на разных сайтах?",
a:[
"Пароль может быстро устареть",
"Если один сайт взломают, получат доступ к другим аккаунтам",
"Так сайты работают медленнее",
"Пароль становится слишком длинным"
],
correct:1,
exp:"Если злоумышленники получают пароль с одного сайта, они часто пытаются использовать его на других сервисах."
},

{
q:"Какой пароль считается более безопасным?",
a:[
"12345678",
"qwerty123",
"Dog2024",
"G7!kP9#zQ"
],
correct:3,
exp:"Надёжный пароль содержит буквы, цифры и символы и не связан с обычными словами."
},

{
q:"Что такое менеджер паролей?",
a:[
"Программа для хранения и создания паролей",
"Сервис для взлома паролей",
"Антивирус",
"Настройка браузера"
],
correct:0,
exp:"Менеджер паролей помогает безопасно хранить и генерировать сложные пароли."
},

{
q:"Почему нельзя хранить пароли в заметках телефона без защиты?",
a:[
"Телефон может зависнуть",
"Другие люди могут получить доступ к заметкам",
"Пароль может удалиться",
"Это занимает память"
],
correct:1,
exp:"Если телефон попадёт в чужие руки, злоумышленник может увидеть все пароли."
},

{
q:"Что делает двухфакторная аутентификация?",
a:[
"Создаёт два пароля",
"Добавляет дополнительную проверку входа",
"Удаляет старый пароль",
"Ускоряет вход"
],
correct:1,
exp:"Кроме пароля требуется код из SMS или приложения."
},

{
q:"Почему нельзя использовать дату рождения в пароле?",
a:[
"Такие пароли быстро устаревают",
"Их легко угадать",
"Сайты их не принимают",
"Они слишком короткие"
],
correct:1,
exp:"Личная информация часто доступна в соцсетях."
},

{
q:"Что нужно сделать, если сайт сообщил о взломе?",
a:[
"Удалить аккаунт",
"Сменить пароль",
"Ничего",
"Перезагрузить компьютер"
],
correct:1,
exp:"Пароль нужно сразу заменить и проверить другие аккаунты."
},

{
q:"Какой способ хранения пароля безопаснее?",
a:[
"В голове или менеджере паролей",
"На бумаге на столе",
"В заметке телефона",
"В сообщении другу"
],
correct:0,
exp:"Менеджеры паролей используют шифрование."
},

{
q:"Почему важно регулярно менять важные пароли?",
a:[
"Чтобы сайт работал быстрее",
"Чтобы уменьшить риск доступа злоумышленников",
"Чтобы освободить память",
"Чтобы пароль стал короче"
],
correct:1,
exp:"Регулярная смена снижает риск использования старого украденного пароля."
},

{
q:"Какой пароль лучше?",
a:[
"password123",
"мойкотик",
"F7!r9Lp#2Q",
"123qwe"
],
correct:2,
exp:"Сложный случайный пароль гораздо труднее взломать."
}

]

let index = 0
let score = 0
let answered = false

const questionText = document.getElementById("questionText")
const answers = document.getElementById("answers")
const explanation = document.getElementById("explanation")
const nextBtn = document.getElementById("nextBtn")
const progressFill = document.getElementById("progressFill")

function showQuestion(){

answered = false
explanation.textContent=""

const q = questions[index]

questionText.textContent = (index+1)+". "+q.q

answers.innerHTML=""

q.a.forEach((text,i)=>{

const btn = document.createElement("button")
btn.className="answer-card"
btn.textContent=text

btn.onclick=()=>selectAnswer(i,btn)

answers.appendChild(btn)

})

progressFill.style.width = (index/questions.length)*100+"%"

}

function selectAnswer(i,btn){

if(answered) return

answered = true

const correct = questions[index].correct
const cards = document.querySelectorAll(".answer-card")

cards.forEach((c,k)=>{

if(k===correct){
c.classList.add("correct")
}

if(k===i && k!==correct){
c.classList.add("wrong")
}

})

if(i===correct) score++

explanation.textContent = questions[index].exp

}

nextBtn.onclick = nextQuestion

document.addEventListener("keydown",e=>{
if(e.key==="Enter") nextQuestion()
})

function nextQuestion(){

if(!answered) return

index++

if(index<questions.length){
showQuestion()
}
else{
finishTest()
}

}

function finishTest(){

progressFill.style.width="100%"

questionText.textContent="Тест завершён!"

answers.innerHTML=""

explanation.innerHTML="Ваш результат: "+score+" из "+questions.length

nextBtn.style.display="none"

}

showQuestion()

</script>

</body>
</html>
