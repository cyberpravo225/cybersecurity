<!doctype html>
<html lang="ru">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CyberGuessr</title>

<link rel="stylesheet" href="css/style.css">

<link
rel="stylesheet"
href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
/>

</head>

<body class="page">

<div class="theme-backdrop" aria-hidden="true">
  <div class="theme-orb theme-orb-one"></div>
  <div class="theme-orb theme-orb-two"></div>
  <div class="theme-grid"></div>
  <canvas class="theme-network" id="theme-network"></canvas>
</div>



<div class="site">

<header class="topbar glass">

<a class="back-btn" href="index.html">
← НАЗАД
</a>

<h2>🌍 CyberGuessr</h2>

<nav class="nav">
<button id="theme-toggle" class="btn icon-btn"></button>
</nav>

</header>


<main class="main">

<section class="section container">

<div class="cyberguessr">

<div id="fact-card">

<h3>Факт</h3>
<p id="fact-text"></p>

</div>


<div id="map"></div>


<div class="cyberguessr-controls">

<button id="guess-btn" class="btn primary">
Подтвердить точку
</button>

<button id="next-round" class="btn">
Следующий раунд
</button>

</div>


<div id="result"></div>

</div>

</section>

</main>

</div>


<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script src="js/main.js"></script>
<script src="js/cyberguessr.js"></script>

<script src="js/theme-network.js"></script>
  <script src="js/background-mode.js"></script>
</body>
</html>
