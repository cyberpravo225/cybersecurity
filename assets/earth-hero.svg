    <circle cx="790" cy="116" r="2.1"/><circle cx="884" cy="70" r="2.8"/><circle cx="962" cy="130" r="2"/>
    <circle cx="80" cy="240" r="2"/><circle cx="170" cy="194" r="2.6"/><circle cx="252" cy="256" r="2.2"/><circle cx="346" cy="214" r="2"/>
    <circle cx="432" cy="274" r="2.4"/><circle cx="526" cy="228" r="2.1"/><circle cx="614" cy="286" r="2.7"/><circle cx="702" cy="232" r="2.2"/>
    <circle cx="792" cy="292" r="2.5"/><circle cx="882" cy="238" r="2"/><circle cx="966" cy="286" r="2.3"/>
