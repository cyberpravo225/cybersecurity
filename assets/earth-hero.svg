<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Земля в космосе</title>
  <desc id="desc">Яркая синяя Земля с видимыми континентами на фоне звездного неба.</desc>
  <defs>
    <radialGradient id="space" cx="52%" cy="62%" r="78%">
      <stop offset="0" stop-color="#1c60d8" stop-opacity=".34"/>
      <stop offset="50%" stop-color="#0a2b7c" stop-opacity=".46"/>
      <stop offset="100%" stop-color="#020b2a"/>
    </radialGradient>
    <radialGradient id="earthOcean" cx="60%" cy="20%" r="80%">
      <stop offset="0" stop-color="#c9fbff"/>
      <stop offset="28%" stop-color="#47bfff"/>
      <stop offset="62%" stop-color="#0d71e4"/>
      <stop offset="100%" stop-color="#032864"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="45%" r="62%">
      <stop offset="74%" stop-color="#83ddff" stop-opacity="0"/>
      <stop offset="90%" stop-color="#81d8ff" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#7ecbff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".58"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#space)"/>

