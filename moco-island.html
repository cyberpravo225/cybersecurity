    .overlay {

      justify-content: space-between;
      padding: 14px;

      min-width: 220px;
      padding: 12px;
      border-radius: 14px;
      background: #fff;
      border: 2px solid transparent;
      cursor: pointer;
      text-align: left;
    }
    .choice:hover { border-color: #90dfff; }

    .start-screen {
      display: grid;
      place-items: center;
      position: absolute;
      inset: 0;
      pointer-events: auto;
      background: radial-gradient(circle at top, rgba(255,255,255,.45), rgba(255,255,255,.05));

      text-align: center;
      padding: 26px;
      border-radius: 26px;
      background: rgba(255,255,255,.93);
      box-shadow: 0 15px 45px rgba(20, 50, 60, .25);
    }
    .subtitle { font-size: 18px; margin-bottom: 12px; }
    .progress-bar {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: #dceffe;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5, #8f5eff);
      transition: width 250ms ease;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .card {
      border-radius: 14px;
      background: #fff;
      padding: 10px;
      border: 2px solid #e4f2ff;
    }
    .notif {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(13, 55, 85, .92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      pointer-events: none;
    }
    .confetti {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0;
      animation: pop .7s ease;
    }
    @keyframes pop {
      0% { opacity: 0; transform: scale(.95); }
      30% { opacity: .9; }
      100% { opacity: 0; transform: scale(1.03); }
    }
  </style>
</head>

<script type="module">
let THREE_LIB = null;
let GLTFLoaderLib = null;
let FBXLoaderLib = null;
const DEP_LOAD_TIMEOUT_MS = 5000;
const MODEL_LOAD_TIMEOUT_MS = 7000;

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timeout`)), ms))
  ]);
}

function parseGLB(arrayBuffer) {
  const dv = new DataView(arrayBuffer);
  const magic = dv.getUint32(0, true);
  if (magic !== 0x46546c67) throw new Error('Invalid GLB');
  let offset = 12;
  let json = null;
  let binChunk = null;
  while (offset < dv.byteLength) {
    const chunkLength = dv.getUint32(offset, true); offset += 4;
    const chunkType = dv.getUint32(offset, true); offset += 4;
    const chunkData = arrayBuffer.slice(offset, offset + chunkLength);
    offset += chunkLength;
    if (chunkType === 0x4e4f534a) json = JSON.parse(new TextDecoder().decode(chunkData));
    if (chunkType === 0x004e4942) binChunk = chunkData;
  }
  if (!json || !binChunk) throw new Error('GLB chunk missing');
  return { json, binChunk };
}

function readAccessorData(json, binChunk, accessorIndex) {
  const accessor = json.accessors[accessorIndex];
  const bufferView = json.bufferViews[accessor.bufferView];
  const byteOffset = (bufferView.byteOffset || 0) + (accessor.byteOffset || 0);
  const count = accessor.count;
  const comp = accessor.componentType;
  const type = accessor.type;
  const compsPerElem = type === 'SCALAR' ? 1 : type === 'VEC2' ? 2 : type === 'VEC3' ? 3 : 4;
  const stride = bufferView.byteStride || (compsPerElem * (comp === 5126 ? 4 : comp === 5125 ? 4 : comp === 5123 ? 2 : 1));
  const dv = new DataView(binChunk, byteOffset, count * stride);
  const out = new Float32Array(count * compsPerElem);
  const getComp = (offset, i) => {
    if (comp === 5126) return dv.getFloat32(offset + i * 4, true);
    if (comp === 5125) return dv.getUint32(offset + i * 4, true);
    if (comp === 5123) return dv.getUint16(offset + i * 2, true);
    if (comp === 5121) return dv.getUint8(offset + i);
    return 0;
  };
  for (let i = 0; i < count; i++) {
    const base = i * stride;
    for (let c = 0; c < compsPerElem; c++) out[i * compsPerElem + c] = getComp(base, c);
  }
  return { data: out, count, compsPerElem };
}

function extractFirstMeshData(glb) {
  const { json, binChunk } = glb;
  const mesh = json.meshes?.[0];
  if (!mesh) throw new Error('No mesh in GLB');
  const primitive = mesh.primitives?.[0];
  const accessorIndex = primitive?.attributes?.POSITION;
  if (accessorIndex === undefined) throw new Error('No POSITION accessor');
  const positions = readAccessorData(json, binChunk, accessorIndex).data;
  let indices = null;
  if (primitive.indices !== undefined) {
    const idx = readAccessorData(json, binChunk, primitive.indices).data;
    indices = new Uint32Array(idx.length);
    for (let i = 0; i < idx.length; i++) indices[i] = idx[i];
  } else {
    indices = new Uint32Array((positions.length / 3) | 0);
    for (let i = 0; i < indices.length; i++) indices[i] = i;
  }
  const mat = json.materials?.[primitive.material];
  const factor = mat?.pbrMetallicRoughness?.baseColorFactor || [0.72, 0.52, 0.34, 1];
  return { positions, indices, color: factor };
}

async function loadThreeDeps() {
  if (THREE_LIB && GLTFLoaderLib && FBXLoaderLib) return;
  const [threeMod, gltfMod, fbxMod] = await withTimeout(Promise.all([
    import('https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js'),
    import('https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/loaders/GLTFLoader.js'),
    import('https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/loaders/FBXLoader.js')
  ]), DEP_LOAD_TIMEOUT_MS, '3D deps');
  THREE_LIB = threeMod;
  GLTFLoaderLib = gltfMod.GLTFLoader;
  FBXLoaderLib = fbxMod.FBXLoader;
}

const SAVE_KEY = 'moco_island_save_v1';
const KNOWLEDGE = {

  fish_phishing: { title: 'Рыбка-фишинг', text: 'Слишком щедрые подарки часто обманывают.' },
  real_friend: { title: 'Настоящий друг', text: 'Друг не просит пароли, коды и секреты.' },

  sender_check: { title: 'Проверка отправителя', text: 'Сравни имя, адрес и стиль сообщения.' }
};

const UPGRADES = [

  { id: 'time_plus', title: '+5 секунд', coco: 30, leaf: 0, effect: 'time' },

const CHAPTERS = [

  { id: 3, title: 'Парк приложений', zone: 'Парк приложений', game: 'permissions', reward: { xp: 38, coco: 28, leaf: 4, cards: ['update_lock'] } },

const defaults = () => ({
  chapter: 0, xp: 0, coco: 0, leaf: 0,
  bought: [], unlockedItems: [], cards: [],
  mocoGrowth: 0, gameFlags: {}, hints: true, sound: true,
  zoneLevel: 0, streak: 0, finished: false, theme: 'light'
});

class SaveManager {
  static load() { try { return { ...defaults(), ...(JSON.parse(localStorage.getItem(SAVE_KEY)) || {}) }; } catch { return defaults(); } }
  static save(state) { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
  static reset() { localStorage.removeItem(SAVE_KEY); }
}

class CharacterSystem {
  constructor(scene) {
    const THREE = THREE_LIB;
    this.scene = scene;
    this.group = new THREE.Group();
    this.group.position.set(0, 0.1, 0);
    scene.add(this.group);
    this.mesh = null;
    this.clock = new THREE.Clock();
    this.state = 'idle';
    this.accessories = {};
    this.mixer = null;
  }

  async init() {
    const THREE = THREE_LIB;
    try {
      const fbxLoader = new FBXLoaderLib();
      const fbx = await withTimeout(fbxLoader.loadAsync('assets/Idlematerial.fbx'), MODEL_LOAD_TIMEOUT_MS, 'fbx monkey model');
      this.mesh = fbx;
      this.mesh.scale.set(1.5, 1.5, 1.5);
      this.mesh.rotation.y = -Math.PI / 2;
      this.mesh.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
      if (fbx.animations?.length) {
        this.mixer = new THREE.AnimationMixer(this.mesh);
        const idle = this.mixer.clipAction(fbx.animations[0]);
        idle.play();
      }
      this.group.add(this.mesh);
    } catch {
      try {
        const loader = new GLTFLoaderLib();
        const gltf = await withTimeout(loader.loadAsync('assets/monkey.glb'), MODEL_LOAD_TIMEOUT_MS, 'monkey model');
        this.mesh = gltf.scene;
        this.mesh.scale.set(1.5, 1.5, 1.5);
        this.mesh.rotation.y = -Math.PI / 2;
        this.mesh.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
        this.group.add(this.mesh);
      } catch {
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 18, 18), new THREE.MeshStandardMaterial({ color: 0xb98952 }));
        body.position.y = 0.7;
        this.mesh = body;
        this.group.add(body);
      }
    }
    this.createAccessories();
  }

  createAccessories() {
    const THREE = THREE_LIB;
    const mk = (geo, color, y = 1.25) => {
      const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.15 }));
      m.position.y = y;
      m.visible = false;
      this.group.add(m);
      return m;
    };
    this.accessories.hat = mk(new THREE.ConeGeometry(0.28, 0.28, 14), 0xffcf56, 1.75);
    this.accessories.bag = mk(new THREE.BoxGeometry(0.5, 0.4, 0.2), 0x48a868, 1.1); this.accessories.bag.position.z = -0.35;
    this.accessories.bracelet = mk(new THREE.TorusGeometry(0.2, 0.05, 12, 20), 0x7f66ff, 0.95); this.accessories.bracelet.rotation.x = Math.PI / 2;
    this.accessories.amulet = mk(new THREE.OctahedronGeometry(0.13), 0x76f7ff, 1.25);
  }

  setState(name) { this.state = name; }

  applyUnlocks(unlocked) {
    Object.values(this.accessories).forEach((a) => (a.visible = false));
    if (unlocked.includes('hat_palm')) this.accessories.hat.visible = true;
    if (unlocked.includes('bag_leaf')) this.accessories.bag.visible = true;
    if (unlocked.includes('bracelet_glow')) this.accessories.bracelet.visible = true;
    if (unlocked.length >= 4) this.accessories.amulet.visible = true;
  }

  tick() {
    if (!this.mesh) return;
    const t = this.clock.getElapsedTime();
    if (this.mixer) this.mixer.update(this.clock.getDelta());
    this.group.position.y = 0.06 * Math.sin(t * 1.7);
    this.group.rotation.y = 0.14 * Math.sin(t * 0.8);
    const s = this.state;
    const base = 1.5;
    if (s === 'happy' || s === 'correct' || s === 'celebrate') this.group.scale.setScalar(base + 0.05 + Math.sin(t * 7) * 0.03);
    else if (s === 'sad' || s === 'incorrect') this.group.scale.set(base * 0.95, base * 0.92, base * 0.95);
    else if (s === 'think') this.group.rotation.z = 0.08 * Math.sin(t * 3);
    else if (s === 'upgrade') this.group.scale.setScalar(base + 0.1 + Math.sin(t * 11) * 0.04);
    else this.group.scale.setScalar(base);
  }
}

class SceneWorld {
  constructor(container) {
    const THREE = THREE_LIB;
    this.container = container;
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x8ee7ff);
    this.camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 200);
    this.camera.position.set(0, 4.7, 9);
    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(innerWidth, innerHeight);
    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    container.appendChild(this.renderer.domElement);
    addEventListener('resize', () => this.onResize());

    const hemi = new THREE.HemisphereLight(0xfff7d0, 0x5cb4ff, 0.9);
    const sun = new THREE.DirectionalLight(0xfff3cf, 1.1);
    sun.position.set(5, 8, 4);
    sun.castShadow = true;
    this.scene.add(hemi, sun);

    const water = new THREE.Mesh(new THREE.CircleGeometry(14, 64), new THREE.MeshStandardMaterial({ color: 0x57c8ff }));
    water.rotation.x = -Math.PI / 2;
    water.position.y = -0.28;
    this.scene.add(water);

    const island = new THREE.Mesh(new THREE.CylinderGeometry(5.5, 6.2, 1.2, 40), new THREE.MeshStandardMaterial({ color: 0x7adf7f }));
    island.receiveShadow = true;
    this.scene.add(island);

    this.zones = [];
    this.makeZones();
    this.character = new CharacterSystem(this.scene);
    this.sparkles = this.createSparkles();
  }

  async init() { await this.character.init(); }

  makeZones() {
    const zoneData = ['Домик', 'Пристань', 'Сад', 'Парк', 'Башня', 'Библиотека', 'Магазин', 'Дерево', 'Камень'];
    zoneData.forEach((z, i) => {
      const a = (i / zoneData.length) * Math.PI * 2;
      const marker = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.5, 0.25, 16),
        new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${i * 42}, 80%, 62%)`) })
      );
      marker.position.set(Math.cos(a) * 3.7, 0.65, Math.sin(a) * 3.7);
      marker.castShadow = true;
      this.scene.add(marker);
      this.zones.push(marker);
    });
  }

  createSparkles() {
    const group = new THREE.Group();
    for (let i = 0; i < 60; i++) {
      const p = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      p.position.set((Math.random() - .5) * 8, 0.4 + Math.random() * 2.2, (Math.random() - .5) * 8);
      group.add(p);
    }
    this.scene.add(group);
    return group;
  }

  setZoneLevel(level) {
    this.zones.forEach((z, i) => {
      z.material.emissive = new THREE.Color(0x000000);
      z.scale.setScalar(1 + Math.min(level, i + 1) * 0.03);
      if (i <= level) z.material.emissive = new THREE.Color(0x1d7c3b);
    });
  }

  setSunset(enabled) {
    this.scene.background = new THREE.Color(enabled ? 0xf6b56d : 0x8ee7ff);
  }

  tick() {
    const t = performance.now() * 0.001;
    this.sparkles.children.forEach((p, i) => { p.position.y += Math.sin(t + i) * 0.0008; });
    this.character.tick();
    this.renderer.render(this.scene, this.camera);
  }

  onResize() {
    this.camera.aspect = innerWidth / innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(innerWidth, innerHeight);
  }
}

class NullWorld {
  constructor(container) {
    this.container = container;
    this.zoneLevel = 0;
    this.sunset = false;
    this.unlocked = [];
    this.charState = 'idle';
    this.canvas = document.createElement('canvas');
    this.ctx = this.canvas.getContext('2d');
    this.canvas.style.position = 'absolute';
    this.canvas.style.inset = '0';
    this.canvas.style.width = '100%';
    this.canvas.style.height = '100%';
    container.innerHTML = '';
    container.appendChild(this.canvas);
    this.resize();
    addEventListener('resize', () => this.resize());
    this.character = {
      applyUnlocks: (items) => { this.unlocked = items || []; },
      setState: (state) => { this.charState = state || 'idle'; }
    };
    this.monkeyMesh = null;
    this.loadMonkeyModel();
  }
  async init() {}
  async loadMonkeyModel() {
    try {
      const resp = await fetch('assets/monkey.glb');
      if (!resp.ok) return;
      const buffer = await resp.arrayBuffer();
      const mesh = extractFirstMeshData(parseGLB(buffer));
      const pos = mesh.positions;
      let minX = Infinity, minY = Infinity, minZ = Infinity;
      let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
      for (let i = 0; i < pos.length; i += 3) {
        const x = pos[i], y = pos[i + 1], z = pos[i + 2];
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
        if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;
      }
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2, cz = (minZ + maxZ) / 2;
      const size = Math.max(maxX - minX, maxY - minY, maxZ - minZ) || 1;
      for (let i = 0; i < pos.length; i += 3) {
        pos[i] = (pos[i] - cx) / size;
        pos[i + 1] = (pos[i + 1] - cy) / size;
        pos[i + 2] = (pos[i + 2] - cz) / size;
      }
      mesh.positions = pos;
      if (mesh.indices.length > 18000) {
        const stride = Math.ceil(mesh.indices.length / 18000);
        const reduced = [];
        for (let i = 0; i < mesh.indices.length; i += 3 * stride) {
          reduced.push(mesh.indices[i], mesh.indices[i + 1], mesh.indices[i + 2]);
        }
        mesh.indices = Uint32Array.from(reduced.filter((v) => Number.isFinite(v)));
      }
      this.monkeyMesh = mesh;
    } catch {}
  }
  resize() {
    this.canvas.width = Math.max(1, this.container.clientWidth);
    this.canvas.height = Math.max(1, this.container.clientHeight);
  }
  setZoneLevel(level) { this.zoneLevel = level || 0; }
  setSunset(enabled) { this.sunset = Boolean(enabled); }
  tick() {
    const ctx = this.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;
    const t = performance.now() * 0.001;
    const sky1 = this.sunset ? '#ffa96b' : '#8de9ff';
    const sky2 = this.sunset ? '#8b5bcf' : '#74dc9a';
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, sky1);
    grad.addColorStop(1, sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    const cx = w * 0.5;
    const cy = h * 0.58;
    ctx.fillStyle = '#52b8f7';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 20, w * 0.35, h * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#7be38c';
    ctx.beginPath();
    ctx.ellipse(cx, cy, w * 0.22, h * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#5fbe67';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 35, w * 0.22, h * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < 9; i++) {
      const a = (i / 9) * Math.PI * 2 + t * 0.05;
      const rx = w * 0.17;
      const ry = h * 0.09;
      const x = cx + Math.cos(a) * rx;
      const y = cy + Math.sin(a) * ry;
      ctx.fillStyle = i <= this.zoneLevel ? '#ffd050' : '#e6f4ff';
      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI * 2);
      ctx.fill();
    }

    const bounce = Math.sin(t * 4) * 8;
    const mx = cx;
    const my = cy - 50 + bounce;
    if (this.monkeyMesh) {
      const { positions, indices, color } = this.monkeyMesh;
      const rot = t * 0.5 - Math.PI / 2; // 90° clockwise
      const c = Math.cos(rot), s = Math.sin(rot);
      const verts2d = new Float32Array((positions.length / 3) * 3);
      for (let i = 0, vi = 0; i < positions.length; i += 3, vi += 3) {
        const x = positions[i] * 160;
        const y = positions[i + 1] * 160;
        const z = positions[i + 2] * 160;
        const rx = x * c - z * s;
        const rz = x * s + z * c + 380;
        const p = 340 / rz;
        verts2d[vi] = mx + rx * p;
        verts2d[vi + 1] = my - y * p;
        verts2d[vi + 2] = rz;
      }
      for (let i = 0; i < indices.length; i += 3) {
        const i0 = indices[i] * 3, i1 = indices[i + 1] * 3, i2 = indices[i + 2] * 3;
        if (!Number.isFinite(verts2d[i0]) || !Number.isFinite(verts2d[i1]) || !Number.isFinite(verts2d[i2])) continue;
        const x0 = verts2d[i0], y0 = verts2d[i0 + 1], z0 = verts2d[i0 + 2];
        const x1 = verts2d[i1], y1 = verts2d[i1 + 1], z1 = verts2d[i1 + 2];
        const x2 = verts2d[i2], y2 = verts2d[i2 + 1], z2 = verts2d[i2 + 2];
        const shade = Math.max(0.55, Math.min(1.12, 520 / ((z0 + z1 + z2) / 3)));
        const r = Math.min(255, Math.floor(color[0] * 255 * shade));
        const g = Math.min(255, Math.floor(color[1] * 255 * shade));
        const b = Math.min(255, Math.floor(color[2] * 255 * shade));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      ctx.fillStyle = '#9f6b3f';
      ctx.beginPath();
      ctx.arc(mx, my, 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f3d2ac';
      ctx.beginPath();
      ctx.arc(mx, my + 5, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1f2d3d';
      ctx.beginPath(); ctx.arc(mx - 6, my, 2.6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(mx + 6, my, 2.6, 0, Math.PI * 2); ctx.fill();
    }

    if (this.unlocked.includes('hat_palm')) {
      ctx.fillStyle = '#ffd86a';
      ctx.beginPath();
      ctx.moveTo(mx, my - 38); ctx.lineTo(mx - 20, my - 15); ctx.lineTo(mx + 20, my - 15);
      ctx.closePath(); ctx.fill();
    }
    if (this.unlocked.includes('bag_leaf')) {
      ctx.fillStyle = '#49ad66';
      ctx.fillRect(mx + 18, my + 4, 12, 16);
    }
    if (this.unlocked.includes('bracelet_glow')) {
      ctx.strokeStyle = '#7f66ff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(mx - 20, my + 22, 7, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (this.charState === 'celebrate' || this.charState === 'correct') {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      for (let i = 0; i < 14; i++) {
        ctx.fillRect(mx - 35 + i * 5, my - 80 - ((t * 100 + i * 11) % 40), 3, 6);
      }
    }
  }
}

async function createWorld(container) {
  try {
    await loadThreeDeps();
    container.innerHTML = '';
    const world = new SceneWorld(container);
    await world.init();
    return world;
  } catch {
    return new NullWorld(container);
  }
}

class Game {
  constructor() {
    this.state = SaveManager.load();
    this.world = new NullWorld(document.getElementById('scene'));
    this.overlay = document.getElementById('overlay');
    this.mainPanel = document.getElementById('mainPanel');
    this.toastEl = document.getElementById('toast');
    this.running = false;
    this.paused = false;
    this.audio = null;
    this.themeBtn = null;
    this.bindStartScreen();
    this.applyTheme(this.resolveInitialTheme());
  }

  async init() {
    this.refreshHUD();
    this.animate();
    createWorld(document.getElementById('scene')).then((world) => {
      this.world = world;
      this.world.character.applyUnlocks(this.state.unlockedItems);
      this.refreshHUD();
    });
  }

  resolveInitialTheme() {
    const siteTheme = localStorage.getItem('cyber_theme');
    if (siteTheme === 'dark' || siteTheme === 'light') return siteTheme;
    return this.state.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }

  bindStartScreen() {
    const start = document.getElementById('startScreen');
    const play = document.getElementById('playBtn');
    const cont = document.getElementById('continueBtn');
    const hintsBtn = document.getElementById('toggleHintsBtn');
    const musicBtn = document.getElementById('toggleMusicBtn');
    const themeStartBtn = document.getElementById('toggleThemeBtn');
    this.themeBtn = document.getElementById('themeBtn');

    const updateMenuLabels = () => {
      hintsBtn.textContent = `Режим подсказок: ${this.state.hints ? 'ВКЛ' : 'ВЫКЛ'}`;
      musicBtn.textContent = `Звук: ${this.state.sound ? 'ВКЛ' : 'ВЫКЛ'}`;
      const themeLabel = this.state.theme === 'dark' ? 'Тёмная' : 'Светлая';
      themeStartBtn.textContent = `Тема: ${themeLabel}`;
      this.themeBtn.textContent = `Тема: ${themeLabel}`;
    };
    updateMenuLabels();

    hintsBtn.onclick = () => { this.state.hints = !this.state.hints; SaveManager.save(this.state); updateMenuLabels(); };
    musicBtn.onclick = () => { this.state.sound = !this.state.sound; SaveManager.save(this.state); updateMenuLabels(); };
    themeStartBtn.onclick = () => { this.toggleTheme(); updateMenuLabels(); };
    this.themeBtn.onclick = () => { this.toggleTheme(); updateMenuLabels(); };

    play.onclick = () => {
      this.ensureAudio();
      const selectedTheme = this.state.theme;
      this.state = defaults();
      this.state.theme = selectedTheme;
      this.applyTheme(this.state.theme);
      SaveManager.save(this.state);
      start.classList.add('hidden');
      this.startFlow(0);
      updateMenuLabels();
    };
    cont.onclick = () => {
      this.ensureAudio();
      start.classList.add('hidden');
      this.startFlow(this.state.chapter || 0);
    };

    document.getElementById('hubBtn').onclick = () => this.showHub();
    document.getElementById('libraryBtn').onclick = () => this.showLibrary();
    document.getElementById('shopBtn').onclick = () => this.showShop();
    document.getElementById('pauseBtn').onclick = () => { this.paused = !this.paused; this.notify(this.paused ? 'Пауза' : 'Продолжаем!'); };
  }

  ensureAudio() {
    if (this.audio) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    try { this.audio = new Ctx(); } catch { this.audio = null; }
  }

  applyTheme(theme) {
    this.state.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('cyber_theme', theme);
    if (theme === 'dark') {
      document.body.style.background = 'linear-gradient(165deg, #20395e, #1b2743)';
    } else {
      document.body.style.background = 'linear-gradient(165deg, var(--bg1), var(--bg2))';
    }
    SaveManager.save(this.state);
  }

  toggleTheme() {
    this.applyTheme(this.state.theme === 'dark' ? 'light' : 'dark');
    this.world.setSunset(this.state.bought.includes('sunset_mode') || this.state.theme === 'dark');
  }

  startFlow(chapter) {
    this.running = true;
    this.overlay.classList.remove('hidden');
    this.runChapter(chapter);
  }

  refreshHUD() {
    document.getElementById('chapterChip').textContent = `Глава ${this.state.chapter}`;
    document.getElementById('xpChip').textContent = `⭐ XP: ${this.state.xp}`;
    document.getElementById('cocoChip').textContent = `🥥 Кокосы: ${this.state.coco}`;
    document.getElementById('leafChip').textContent = `🍃 Листья: ${this.state.leaf}`;
    this.world.setZoneLevel(this.state.zoneLevel);
    this.world.setSunset(this.state.bought.includes('sunset_mode') || this.state.theme === 'dark');
    this.world.character.applyUnlocks(this.state.unlockedItems);
  }

  playTone(freq, dur = 0.1) {
    if (!this.state.sound || !this.audio) return;
    const osc = this.audio.createOscillator();
    const gain = this.audio.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.03;
    osc.connect(gain).connect(this.audio.destination);
    osc.start();
    osc.stop(this.audio.currentTime + dur);
  }

  notify(text) {
    this.toastEl.textContent = text;
    this.toastEl.classList.remove('hidden');
    setTimeout(() => this.toastEl.classList.add('hidden'), 1600);
  }

  async runChapter(id) {
    const chapter = CHAPTERS[id];
    if (!chapter) return this.finalCeremony();
    this.state.chapter = id;
    this.refreshHUD();

    this.world.character.setState('think');
    this.mainPanel.innerHTML = `
      <h2>📖 ${chapter.title}</h2>
      <p><b>Локация:</b> ${chapter.zone}</p>
      <p>Моко готовится к заданию. ${this.state.hints ? 'Подсказки включены.' : 'Подсказки скрыты.'}</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${(id / CHAPTERS.length) * 100}%"></div></div>
      <div class="row">
        <button class="primary" id="startChapterBtn">Начать задание</button>
        <button id="backHubBtn">В хаб</button>
      </div>`;
    document.getElementById('backHubBtn').onclick = () => this.showHub();
    document.getElementById('startChapterBtn').onclick = async () => {
      const result = await this.launchMiniGame(chapter.game);
      this.applyReward(chapter, result.perfect);
      if (id >= CHAPTERS.length - 1) this.finalCeremony();
      else this.runChapter(id + 1);
    };
  }

  showHub() {
    const next = CHAPTERS[this.state.chapter];
    this.mainPanel.innerHTML = `
      <h2>🏝️ Остров Моко</h2>
      <p>Места: Домик, Почтовая пристань, Фруктовый сад, Парк приложений, Башня защиты, Библиотека знаний, Рынок улучшений, Дерево доверия, Серверный камень.</p>
      <p>Следующая миссия: <b>${next ? next.title : 'Финальная церемония'}</b></p>
      <div class="row">
        <button class="primary" id="continueStory">Продолжить сюжет</button>
        <button id="goShop">Улучшения</button>
        <button id="goLib">Карточки знаний</button>
      </div>`;
    document.getElementById('continueStory').onclick = () => this.runChapter(this.state.chapter);
    document.getElementById('goShop').onclick = () => this.showShop();
    document.getElementById('goLib').onclick = () => this.showLibrary();
  }

  showLibrary() {
    const cards = Object.entries(KNOWLEDGE).map(([id, c]) => {
      const open = this.state.cards.includes(id);
      return `<div class="card"><h3>${open ? '📘 ' + c.title : '🔒 ???'}</h3><p>${open ? c.text : 'Откроется после приключений Моко.'}</p></div>`;
    }).join('');
    this.mainPanel.innerHTML = `
      <h2>📚 Библиотека знаний</h2>
      <div class="mini-grid">${cards}</div>
      <div class="row" style="margin-top:10px;"><button id="hubReturn">Вернуться</button></div>`;
    document.getElementById('hubReturn').onclick = () => this.showHub();
  }

  showShop() {
    const items = UPGRADES.map((u) => {
      const bought = this.state.bought.includes(u.id);
      return `<div class="card"><h3>${bought ? '✅' : '🛍️'} ${u.title}</h3><p>Цена: ${u.coco} 🥥 / ${u.leaf} 🍃</p><button data-buy="${u.id}" ${bought ? 'disabled' : ''}>${bought ? 'Куплено' : 'Купить'}</button></div>`;
    }).join('');
    this.mainPanel.innerHTML = `<h2>🛒 Рынок улучшений</h2><div class="mini-grid">${items}</div><div class="row" style="margin-top:10px;"><button id="shopBack">В хаб</button></div>`;
    this.mainPanel.querySelectorAll('[data-buy]').forEach((b) => {
      b.onclick = () => {
        const id = b.dataset.buy;
        const item = UPGRADES.find((u) => u.id === id);
        if (this.state.coco < item.coco || this.state.leaf < item.leaf) return this.notify('Нужно больше валюты!');
        this.state.coco -= item.coco; this.state.leaf -= item.leaf;
        this.state.bought.push(id);
        if (item.cosmetic && !this.state.unlockedItems.includes(item.id)) this.state.unlockedItems.push(item.id);
        this.world.character.setState('upgrade');
        this.playTone(700, 0.12);
        SaveManager.save(this.state);
        this.refreshHUD();
        this.showShop();
      };
    });
    document.getElementById('shopBack').onclick = () => this.showHub();
  }

  applyReward(chapter, perfect) {
    const rw = chapter.reward;
    this.state.xp += rw.xp;
    this.state.coco += rw.coco + (perfect && this.state.bought.includes('perfect_bonus') ? 6 : 0);
    this.state.leaf += rw.leaf + (perfect ? 1 : 0);
    this.state.zoneLevel = Math.max(this.state.zoneLevel, chapter.id + 1);
    rw.cards?.forEach((c) => !this.state.cards.includes(c) && this.state.cards.push(c));
    rw.unlock?.forEach((u) => !this.state.unlockedItems.includes(u) && this.state.unlockedItems.push(u));
    this.state.mocoGrowth += 1;
    this.state.gameFlags[chapter.game] = true;
    this.world.character.setState(perfect ? 'celebrate' : 'happy');
    this.playTone(perfect ? 880 : 660, 0.14);
    SaveManager.save(this.state);
    this.refreshHUD();
    this.mainPanel.innerHTML = `
      <div class="confetti"></div>
      <h2>🎁 Награда получена!</h2>
      <p>+${rw.xp} XP, +${rw.coco} кокосов, +${rw.leaf}${perfect ? ' + бонус за идеал!' : ''}</p>
      <p>Моко становится опытнее и украшает остров новыми огнями и декором.</p>
      <button class="primary" id="afterReward">Дальше</button>`;
    document.getElementById('afterReward').onclick = () => {};
  }

  async launchMiniGame(type) {
    if (type === 'prologue') return this.gamePrologue();
    if (type === 'sorting' || type === 'sorting_phish') return this.gameSorting(type);
    if (type === 'permissions') return this.gamePermissions();
    if (type === 'friends') return this.gameFriends();
    if (type === 'cleanup') return this.gameCleanup();
    return this.gameFinalMix();
  }

  gamePrologue() {
    return new Promise((resolve) => {
      this.mainPanel.innerHTML = `<h2>👋 Приветствие</h2><p>Тико: «Если сообщение просит пароль — это ловушка?»</p>
      <div class="row"><button class="choice" data-ok="1">Да, нужно остановиться и проверить</button><button class="choice" data-ok="0">Нет, надо быстро отправить пароль</button></div>`;
      this.mainPanel.querySelectorAll('.choice').forEach((c) => c.onclick = () => {
        const ok = c.dataset.ok === '1';
        this.world.character.setState(ok ? 'correct' : 'incorrect');
        this.notify(ok ? 'Отличный старт!' : 'Не беда, учимся вместе.');
        resolve({ perfect: ok });
      });
    });
  }

  gameSorting(mode) {
    const tasks = mode === 'sorting' ? [
      { text: '«Срочно! Пришли пароль для проверки»', safe: false },
      { text: '«Письмо от учителя о расписании»', safe: true },
      { text: '«Ты выиграл 1000 подарков, жми!»', safe: false },
      { text: '«Подтверди домашку в школьном чате»', safe: true }
    ] : [
      { text: '«Бесплатный редкий фрукт, только сегодня!»', safe: false },
      { text: '«Рецепт смузи от мамы»', safe: true },
      { text: '«Кликни для супер-скина без проверки»', safe: false },
      { text: '«Сообщение от класса с фото похода»', safe: true }
    ];
    return this.quizLoop(tasks, (t) => `Выбери: доверять или проверить.\n${t.text}`);
  }

  gamePermissions() {
    return new Promise((resolve) => {
      const list = [
        { id: 'cam', text: 'Камера для фото профиля', need: true },
        { id: 'mic', text: 'Микрофон для голосовых', need: true },
        { id: 'sms', text: 'Чтение всех SMS', need: false },
        { id: 'files', text: 'Удаление системных файлов', need: false }
      ];
      const render = () => {
        const rows = list.map((i) => `<label class="card"><input type="checkbox" data-id="${i.id}" ${i.sel ? 'checked' : ''}/> ${i.text}</label>`).join('');
        this.mainPanel.innerHTML = `<h2>🧩 Разрешения приложения</h2><p>Оставь только нужные разрешения.</p><div class="mini-grid">${rows}</div><button class="primary" id="checkPerm">Проверить</button>`;
        this.mainPanel.querySelectorAll('input').forEach((el) => el.onchange = () => { list.find((x) => x.id === el.dataset.id).sel = el.checked; });
        document.getElementById('checkPerm').onclick = () => {
          const ok = list.every((i) => Boolean(i.sel) === i.need);
          this.world.character.setState(ok ? 'correct' : 'incorrect');
          resolve({ perfect: ok });
        };
      };
      render();
    });
  }

  gameFriends() {
    const profiles = [
      { text: 'Друг Лёша: обычный стиль, без срочности, без просьб кода.', real: true },
      { text: 'L0sha_new: «СРОЧНО пришли код из SMS!»', real: false },
      { text: 'Leha.support: «подтверди пароль, иначе удалим чат»', real: false }
    ];
    return this.quizLoop(profiles, (p) => `Кто настоящий друг?\n${p.text}`, true);
  }

  gameCleanup() {
    return new Promise((resolve) => {
      let score = 0;
      const target = 8;
      const render = () => {
        const dots = Array.from({ length: 12 }, (_, i) => `<button class="card" data-bug="${i}" style="height:52px;">${Math.random() > .5 ? '🐞 Вирус' : '✨ Чисто'}</button>`).join('');
        this.mainPanel.innerHTML = `<h2>🧹 Вирусная буря</h2><p>Очисти минимум ${target} заражённых точек. Сейчас: ${score}</p><div class="mini-grid">${dots}</div>`;
        this.mainPanel.querySelectorAll('[data-bug]').forEach((b) => b.onclick = () => {
          if (b.textContent.includes('🐞')) { score++; b.textContent = '✅'; this.playTone(720, .05); }
          if (score >= target) { this.world.character.setState('celebrate'); resolve({ perfect: true }); }
        });
      };
      render();
      setTimeout(() => resolve({ perfect: score >= target }), 30000);
    });
  }

  async gameFinalMix() {
    const tasks = [
      { text: 'Письмо с просьбой пароля', safe: false },
      { text: 'Ссылка на супер-подарок без проверки', safe: false },
      { text: 'Приложение просит удалить системные файлы', safe: false },
      { text: 'Друг пишет спокойно и не просит коды', safe: true },
      { text: 'Включить обновления безопасности', safe: true }
    ];
    return this.quizLoop(tasks, (t) => `Финальное испытание:\n${t.text}`);
  }

  quizLoop(tasks, promptBuilder, chooseReal = false) {
    return new Promise((resolve) => {
      let i = 0, good = 0;
      const next = () => {
        const t = tasks[i];
        if (!t) {
          const perfect = good >= tasks.length - 1;
          this.world.character.setState(perfect ? 'celebrate' : 'happy');
          return resolve({ perfect });
        }
        this.mainPanel.innerHTML = `<h2>🎮 Мини-игра</h2><p>${promptBuilder(t).replace('\n', '<br>')}</p>
        <div class="row">
          <button class="choice" id="okBtn">${chooseReal ? 'Это настоящий' : 'Можно доверять'}</button>
          <button class="choice" id="checkBtn">${chooseReal ? 'Похоже подделка' : 'Нужно проверить'}</button>
        </div>`;
        document.getElementById('okBtn').onclick = () => pick(true);
        document.getElementById('checkBtn').onclick = () => pick(false);
      };
      const pick = (trust) => {
        const t = tasks[i];
        const right = chooseReal ? t.real === trust : t.safe === trust;
        if (right) {
          good++;
          this.playTone(820, .08);
          this.world.character.setState('correct');
          this.notify('Верно!');
        } else {
          this.playTone(220, .1);
          this.world.character.setState('incorrect');
          this.notify('Почти! Сперва проверяем.');
        }
        i++;
        setTimeout(next, 250);
      };
      next();
    });
  }

  finalCeremony() {
    this.state.finished = true;
    this.state.unlockedItems.push('legendary_totem');
    SaveManager.save(this.state);
    this.world.character.setState('celebrate');
    this.mainPanel.innerHTML = `
      <div class="confetti"></div>
      <h2>🌟 Большая церемония Серверного Камня</h2>
      <p>Моко вырос в настоящего Защитника Острова! Остров сияет, дерево доверия расцвело, и открыт легендарный амулет.</p>
      <h3>Что выучили:</h3>
      <div class="mini-grid">${this.state.cards.map((c) => `<div class="card"><b>${KNOWLEDGE[c]?.title || c}</b><p>${KNOWLEDGE[c]?.text || ''}</p></div>`).join('')}</div>
      <div class="row" style="margin-top:12px;"><button class="primary" id="restart">Играть заново</button><button id="hubFinal">Свободный режим в хабе</button></div>`;
    document.getElementById('restart').onclick = () => {
      this.state = defaults(); SaveManager.save(this.state); this.runChapter(0);
    };
    document.getElementById('hubFinal').onclick = () => this.showHub();
  }

  animate() {
    requestAnimationFrame(() => this.animate());
    if (this.paused) return;
    this.world.tick();
  }
}

const game = new Game();
game.init();
</script>
